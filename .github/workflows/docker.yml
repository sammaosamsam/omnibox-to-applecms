name: Docker Build and Deploy

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

# 权限配置
permissions:
  contents: read
  packages: write
  security-events: write
  actions: read
  deployments: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/omnibox-to-applecms
  NODE_VERSION: '20-alpine'
  DOCKER_BUILDKIT: 1
  # Docker Hub 配置（启用时设为 true）
  DOCKERHUB_ENABLED: ${{ vars.DOCKERHUB_ENABLED }}
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_REPO: sanmaosam/omnibox-to-applecms

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: 环境信息
  # ─────────────────────────────────────────────────────────────
  info:
    name: Build Info
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ startsWith(github.ref, 'refs/tags/v') }}
      is_main: ${{ github.ref == 'refs/heads/main' }}
      version: ${{ steps.version.outputs.VERSION }}
      is_update_available: ${{ steps.version.outputs.UPDATE_AVAILABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          REF=${{ github.ref }}
          if [[ $REF == refs/tags/v* ]]; then
            VERSION=${REF#refs/tags/v}
          else
            VERSION=build-${{ github.run_number }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "UPDATE_AVAILABLE=true" >> $GITHUB_OUTPUT

      - name: Print Build Info
        run: |
          echo "=== Build Info ==="
          echo "Git Ref: ${{ github.ref }}"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────
  # Job 2: 安全扫描（依赖检查）
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Run Trivy in scan mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-scan'

  # ─────────────────────────────────────────────────────────────
  # Job 3: Docker 镜像构建（多平台）
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: [info, security-scan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          # 暂时只构建 amd64（GitHub Actions ARM64 runner 内存有限，可能导致 npm install 失败）
          - linux/amd64
          # 如需 ARM64 支持，可取消下面的注释（需要配置更大内存的 self-hosted runner）
          # - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub 登录（仅当 secrets 配置后才执行）
      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.info.outputs.version }}

      - name: Extract metadata (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_REPO }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.info.outputs.version }}

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push (Docker Hub)
        if: ${{ vars.DOCKERHUB_ENABLED == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────────
  # Job 4: 多架构镜像摘要验证
  # ─────────────────────────────────────────────────────────────
  manifest:
    name: Verify Manifest
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify manifest list
        run: |
          echo "=== Multi-arch manifest ==="
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────────────────────
  # 注意：已移除 update-config job，因为它需要推送权限
  # 版本信息可通过 GitHub API 获取：gh api repos/{owner}/{repo}/releases/latest
  # 如需自动更新 data/deployment.json，建议在本地运行或使用 PAT
  # ─────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────
  # Job 6: 发布（仅 tag 触发）
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [info, build, manifest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Release Notes
        id: release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          cat > release-notes.md << 'EOF'
          # Release vVERSION_PLACEHOLDER

          ## Docker Images

          ```bash
          # Latest
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Specific version
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:VERSION_PLACEHOLDER
          ```

          ## docker-compose

          ```yaml
          services:
            omnibox-proxy:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:VERSION_PLACEHOLDER
              ports:
                - "3000:3000"
              volumes:
                - omnibox_data:/app/data
              environment:
                ADMIN_API_KEY: your-secret-key
          ```

          ## What's Changed

          See commit history
          EOF

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" release-notes.md
          echo "RELEASE_NOTES_PATH=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.release-notes.outputs.RELEASE_NOTES_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 7: 构建状态汇总
  # ─────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    needs: [info, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Docker Build Summary"
          echo ""
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Version | ${{ needs.info.outputs.version }} |"
          echo "| Event | ${{ github.event_name }} |"
          echo "| Architectures | amd64 |"
          echo ""
          echo "### Images"
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
          echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.info.outputs.version }}\`"
