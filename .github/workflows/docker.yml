name: Docker Build and Deploy

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/omnibox-to-applecms
  NODE_VERSION: '20-alpine'
  DOCKER_BUILDKIT: 1

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: 环境信息
  # ─────────────────────────────────────────────────────────────
  info:
    name: Build Info
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ startsWith(github.ref, 'refs/tags/v') }}
      is_main: ${{ github.ref == 'refs/heads/main' }}
      version: ${{ steps.version.outputs.VERSION }}
      is_update_available: ${{ steps.version.outputs.UPDATE_AVAILABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          REF=${{ github.ref }}
          if [[ $REF == refs/tags/v* ]]; then
            VERSION=${REF#refs/tags/v}
          else
            VERSION=build-${{ github.run_number }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "UPDATE_AVAILABLE=true" >> $GITHUB_OUTPUT

      - name: Print Build Info
        run: |
          echo "=== Build Info ==="
          echo "Git Ref: ${{ github.ref }}"
          echo "Version: ${{ steps.version.outputs.VERSION }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

  # ─────────────────────────────────────────────────────────────
  # Job 2: 安全扫描（代码）
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: Check for vulnerable dependencies
        run: |
          if grep -q '"vulnerabilities"' trivy-results.sarif 2>/dev/null || \
             grep -q '"severity":"CRITICAL"' trivy-results.sarif 2>/dev/null; then
            echo "⚠️ Security vulnerabilities found - review required"
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 3: Docker 镜像构建（多平台）
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: [info, security-scan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.info.outputs.version }}

      - name: Build and push (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────────
  # Job 4: Docker Scout 安全扫描
  # ─────────────────────────────────────────────────────────────
  scout:
    name: Docker Scout Security
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          only-fixable: true
          to-labels: true
          exit-code: true

      - name: Docker Scout Summary
        run: |
          echo "=== Docker Scout Analysis ==="
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Analysis complete - check Security tab for details"

  # ─────────────────────────────────────────────────────────────
  # Job 5: 生成 SBOM（软件物料清单）
  # ─────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────
  # Job 6: 多架构镜像摘要验证
  # ─────────────────────────────────────────────────────────────
  manifest:
    name: Verify Manifest
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify manifest list
        run: |
          echo "=== Verifying multi-arch manifest ==="
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          echo ""
          echo "=== Supported architectures ==="
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --format '{{range .Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}'

  # ─────────────────────────────────────────────────────────────
  # Job 7: 更新数据配置（仅 main 分支）
  # ─────────────────────────────────────────────────────────────
  update-config:
    name: Update Data Config
    needs: [info, scout]
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' &&
      needs.info.outputs.is_main == 'true'
    outputs:
      updated: ${{ steps.update.outputs.UPDATED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update data template
        id: update
        run: |
          VERSION=${{ needs.info.outputs.version }}
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          
          # 创建数据配置文件
          cat > data/deployment.json << EOF
          {
            "version": "$VERSION",
            "image": "$IMAGE",
            "tag": "latest",
            "arch": ["amd64", "arm64"],
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "build_sha": "${{ github.sha }}",
            "deployment": {
              "port": 3000,
              "data_volume": "omnibox_data",
              "health_check": "/admin/status",
              "restart_policy": "unless-stopped"
            },
            "environment": {
              "PORT": 3000,
              "LOG_LEVEL": "info",
              "LOG_FILE": "/app/data/app.log",
              "DATA_FILE": "/app/data/sources.json"
            }
          }
          EOF
          
          echo "UPDATED=true" >> $GITHUB_OUTPUT
          echo "Config updated with version: $VERSION"

      - name: Commit and push update
        run: |
          git add data/
          git commit -m "chore: update deployment config for ${{ needs.info.outputs.version }}" || exit 0
          git push

  # ─────────────────────────────────────────────────────────────
  # Job 8: 发布（仅 tag 触发）
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [info, build, scout, sbom, manifest]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-spdx
          path: .

      - name: Generate Release Notes
        id: release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          
          cat > release-notes.md << 'EOF'
          # Release v$VERSION
          
          ## Docker Images
          
          Pull the latest image:
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ```
          
          Or use a specific version:
          ```bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          ```
          
          ## Quick Start
          
          ```yaml
          # docker-compose.yml
          services:
            omnibox-proxy:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
              ports:
                - "3000:3000"
              volumes:
                - omnibox_data:/app/data
              environment:
                ADMIN_API_KEY: your-secret-key
          ```
          
          ## What's Changed
          
          See [commit history](${{ github.server_url }}/${{ github.repository }}/commits/v$VERSION)
          
          ## Security
          
          - Docker Scout scan completed
          - SBOM available in artifacts
          EOF
          
          echo "RELEASE_NOTES_PATH=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.release-notes.outputs.RELEASE_NOTES_PATH }}
          generate_release_notes: true
          files: |
            sbom.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 9: 构建状态汇总
  # ─────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    needs: [info, build, scout, update-config]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Docker Build Summary"
          echo ""
          echo "| Item | Value |"
          echo "|------|-------|"
          echo "| Version | ${{ needs.info.outputs.version }} |"
          echo "| Build Type | ${{ github.event_name }} |"
          echo "| Commit | \`${{ github.sha }}\` |"
          echo "| Architectures | amd64, arm64 |"
          echo "| Registry | ${{ env.REGISTRY }} |"
          echo ""
          
          if [[ "${{ needs.info.outputs.is_main }}" == "true" ]]; then
            echo "### Deployment Ready"
            echo ""
            echo "```bash"
            echo "# Pull latest image"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo ""
            echo "# Run with docker-compose"
            echo "docker run -d \\"
            echo "  --name omnibox-proxy \\"
            echo "  -p 3000:3000 \\"
            echo "  -v omnibox_data:/app/data \\"
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "```"
          fi
          
          if [[ "${{ needs.scout.outputs.vulnerabilities_found }}" == "true" ]]; then
            echo ""
            echo "⚠️ **Security Notice**: Some vulnerabilities detected. Review the Security tab."
          fi
